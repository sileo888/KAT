<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lexicon — A Vocabulary of Key Terms</title>

  <style>
    /* ============================================================
       CALM STUDY-PAGE DESIGN  (shared look across all study tools)
       The WORDS are not in this file — they live in  terms.json .
       ============================================================ */

    :root {
      --paper:      #f6f2ea;
      --paper-card: #fffdf8;
      --ink:        #2c2a26;
      --ink-soft:   #6f6a60;
      --accent:     #9a6a3c;
      --line:       #e6dfd2;
      --shadow:     0 1px 2px rgba(60,50,35,.05), 0 8px 24px rgba(60,50,35,.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --paper:#1c1a17; --paper-card:#262320; --ink:#ece7dd; --ink-soft:#a9a196;
        --accent:#d0a271; --line:#38332c; --shadow:0 1px 2px rgba(0,0,0,.25),0 10px 28px rgba(0,0,0,.30);
      }
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; background: var(--paper); color: var(--ink);
      font-family: Georgia, "Iowan Old Style", "Palatino Linotype", Palatino, serif;
      line-height: 1.65; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 3.4vh 22px 14vh; }

    /* ---- Top navigation ---- */
    .nav { display: flex; gap: .4rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2.4rem; }
    .nav a {
      text-decoration: none; color: var(--ink-soft); font-size: 1rem;
      padding: .4rem .85rem; border-radius: 10px; border: 1px solid transparent;
      transition: color .15s ease, border-color .15s ease;
    }
    .nav a:hover { color: var(--accent); }
    .nav a.here { color: var(--accent); border-color: var(--line); background: var(--paper-card); }

    /* ---- Header ---- */
    header { text-align: center; margin-bottom: 2.2rem; }
    h1 { font-size: clamp(2.1rem, 6vw, 3.1rem); line-height: 1.1; margin: 0 0 .5rem; font-weight: 600; letter-spacing: .01em; }
    .subtitle { color: var(--ink-soft); font-size: clamp(1rem, 2.4vw, 1.15rem); font-style: italic; margin: 0; }

    /* ---- Search ---- */
    /* ---- Sticky top bar: search + A–Z, always in reach ---- */
    .topbar {
      position: sticky; top: 0; z-index: 5; background: var(--paper);
      padding: 1rem 0 .55rem; box-shadow: 0 8px 14px -10px rgba(60,50,35,.35);
    }
    #search {
      width: 100%; font-family: inherit; font-size: 1.15rem; color: var(--ink);
      background: var(--paper-card); border: 1px solid var(--line); border-radius: 14px;
      padding: .95rem 1.15rem; box-shadow: var(--shadow); outline: none;
      transition: border-color .18s ease;
    }
    #search::placeholder { color: var(--ink-soft); font-style: italic; }
    #search:focus { border-color: var(--accent); }
    .count { text-align: center; color: var(--ink-soft); font-size: .9rem; font-style: italic; margin: .8rem 0 1.6rem; min-height: 1.2em; }

    /* ---- A to Z jump row: one compact, swipeable line ---- */
    .az {
      display: flex; flex-wrap: nowrap; overflow-x: auto; gap: .3rem; margin: .6rem 0 0;
      padding-bottom: .15rem; -webkit-overflow-scrolling: touch; scrollbar-width: thin;
    }
    .az::-webkit-scrollbar { height: 4px; }
    .az::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
    .az-letter {
      flex: 0 0 auto; font-family: inherit; font-size: .92rem; color: var(--ink-soft);
      background: var(--paper-card); border: 1px solid var(--line); border-radius: 9px;
      min-width: 1.9rem; padding: .3rem .2rem; cursor: pointer;
      transition: color .15s ease, border-color .15s ease;
    }
    .az-letter:hover { color: var(--accent); border-color: var(--accent); }

    /* ---- Category filter chips (the book's order of motion) ---- */
    .chips {
      display: flex; flex-wrap: nowrap; overflow-x: auto; gap: .4rem; margin: .7rem 0 0;
      padding-bottom: .15rem; -webkit-overflow-scrolling: touch; scrollbar-width: thin;
    }
    .chips::-webkit-scrollbar { height: 4px; }
    .chips::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
    .chip {
      flex: 0 0 auto; font-family: inherit; font-size: .9rem; color: var(--ink-soft);
      background: var(--paper-card); border: 1px solid var(--line); border-radius: 999px;
      padding: .42rem .95rem; cursor: pointer; white-space: nowrap;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
    }
    .chip:hover { color: var(--accent); border-color: var(--accent); }
    .chip.active { color: #fff; background: var(--accent); border-color: var(--accent); }

    /* ---- Cards ---- */
    .card {
      background: var(--paper-card); border: 1px solid var(--line); border-radius: 18px;
      padding: 1.7rem 1.8rem; margin: 0 0 1.15rem; box-shadow: var(--shadow); scroll-margin-top: 188px;
    }
    .term { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 600; letter-spacing: .04em; margin: 0 0 .55rem; color: var(--accent); }
    .definition { font-size: clamp(1.08rem, 2.6vw, 1.22rem); color: var(--ink); margin: 0; }
    .deflabel { font-variant: small-caps; letter-spacing: .03em; font-weight: 700; color: var(--accent); }

    /* ---- Editorial lines: source notes and flags, quieter than the definition ---- */
    .defsource, .defflag { display: block; font-size: .82rem; line-height: 1.5; color: var(--ink-soft); margin-top: .6rem; }
    .defsource { font-style: italic; }

    /* ---- Superseded original (kept, never deleted) ---- */
    .superseded {
      font-size: .95rem; color: var(--ink-soft); margin: .95rem 0 0; padding-top: .8rem;
      border-top: 1px dashed var(--line);
    }
    .sup-label { font-variant: small-caps; letter-spacing: .03em; font-weight: 700; color: var(--ink-soft); display: inline; }

    /* ---- Correction below the original (State B) ---- */
    .correction-note {
      font-size: .98rem; color: var(--ink); margin: .95rem 0 0; padding-top: .8rem;
      border-top: 1px dashed var(--line);
    }
    .corr-label { font-variant: small-caps; letter-spacing: .03em; font-weight: 700; color: var(--accent); display: inline; }

    /* ---- Correction drafting tool ---- */
    .card-tools { margin-top: 1.1rem; display: flex; flex-wrap: wrap; align-items: center; gap: .6rem .8rem; }
    .corr-state { font-size: .9rem; color: var(--ink-soft); font-style: italic; }
    .quiet-link { font-size: .88rem; color: var(--ink-soft); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }
    .quiet-link:hover { color: var(--accent); }
    .btn-warn {
      font-size: .9rem; color: var(--ink-soft); background: transparent; border: 1px solid var(--line);
      border-radius: 10px; padding: .4rem .8rem; transition: color .15s ease, border-color .15s ease;
    }
    .btn-warn:hover { color: #9a3b2c; border-color: #9a3b2c; }
    button { font-family: inherit; cursor: pointer; }
    .btn-draft {
      font-size: .9rem; color: var(--ink-soft); background: transparent;
      border: 1px solid var(--line); border-radius: 10px; padding: .4rem .8rem;
      transition: color .15s ease, border-color .15s ease;
    }
    .btn-draft:hover { color: var(--accent); border-color: var(--accent); }

    .correction { margin-top: 1rem; }
    .corr-hint { display: block; font-size: .9rem; color: var(--ink-soft); font-style: italic; margin-bottom: .5rem; }
    .corr-input {
      width: 100%; min-height: 8rem; font-family: inherit; font-size: 1.02rem; line-height: 1.5;
      color: var(--ink); background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
      padding: .8rem .9rem; outline: none; resize: vertical;
    }
    .corr-input:focus { border-color: var(--accent); }
    .corr-actions { display: flex; gap: .5rem; margin-top: .6rem; flex-wrap: wrap; }
    .btn-primary {
      font-size: .9rem; color: #fff; background: var(--accent); border: 1px solid var(--accent);
      border-radius: 10px; padding: .5rem .95rem;
    }
    .btn-quiet {
      font-size: .9rem; color: var(--ink-soft); background: transparent; border: 1px solid var(--line);
      border-radius: 10px; padding: .5rem .95rem;
    }
    .corr-output { margin-top: 1rem; }
    .corr-note { font-size: .9rem; color: var(--ink-soft); font-style: italic; margin: 0 0 .5rem; }
    .corr-block {
      white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: .92rem; line-height: 1.55; color: var(--ink); background: var(--paper);
      border: 1px solid var(--line); border-radius: 12px; padding: .9rem 1rem; margin: 0 0 .6rem;
    }

    .empty { text-align: center; color: var(--ink-soft); font-style: italic; padding: 2rem 0; display: none; }
    .status { text-align: center; color: var(--ink-soft); font-style: italic; padding: 2rem 0; }
    footer { margin-top: 4rem; text-align: center; color: var(--ink-soft); font-size: .85rem; font-style: italic; }
  </style>
</head>

<body>
  <div class="wrap">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="lexicon.html" class="here">Lexicon</a>
      <a href="flashcards.html">Flash Cards</a>
      <a href="keystone.html">Keystone</a>
    </nav>

    <header>
      <h1>Lexicon</h1>
      <p class="subtitle">A vocabulary of key terms</p>
    </header>

    <div class="topbar">
      <input id="search" type="search" placeholder="Search a term or a word in its meaning…"
             autocomplete="off" aria-label="Search the lexicon" />
      <nav class="chips" id="chips" aria-label="Filter by category"></nav>
      <nav class="az" id="az" aria-label="Jump to a letter"></nav>
    </div>
    <div class="count" id="count"></div>

    <main id="cards"></main>
    <p class="empty" id="empty">No entries match your search.</p>
    <p class="status" id="status">Loading the lexicon…</p>

    <footer>Study lexicon · terms are kept in alphabetical order · originals are never deleted.</footer>
  </div>

  <script src="shared.js?v=4"></script>
  <script>
    // The categories, in the book's order of motion (not alphabetical).
    const CATEGORY_ORDER = ["The Two Realities", "The Receiver", "The Turn", "The Summit", "The Saturation", "The Descent"];

    const cardsEl  = document.getElementById("cards");
    const emptyEl  = document.getElementById("empty");
    const countEl  = document.getElementById("count");
    const searchEl = document.getElementById("search");
    const azEl     = document.getElementById("az");
    const chipsEl  = document.getElementById("chips");
    const statusEl = document.getElementById("status");

    let sorted = [];
    let firstIndex = {};
    let activeCat = "all";

    function markQuery(safe, query) {
      if (!query) return safe;
      const q = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp("(" + q + ")", "gi"), "<mark>$1</mark>");
    }
    function termHTML(term, query) { return markQuery(escapeHtml(term), query); }

    // Filter chips: All + the six categories in the book's order.
    function buildChips() {
      const chips = [{ label: "All", value: "all" }]
        .concat(CATEGORY_ORDER.map(c => ({ label: c, value: c })));
      chipsEl.innerHTML = chips.map(c =>
        '<button class="chip' + (c.value === activeCat ? " active" : "") +
        '" type="button" data-cat="' + escapeHtml(c.value) + '">' + escapeHtml(c.label) + "</button>"
      ).join("");
    }

    chipsEl.addEventListener("click", e => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      activeCat = btn.dataset.cat;
      [...chipsEl.children].forEach(ch => ch.classList.toggle("active", ch.dataset.cat === activeCat));
      render(searchEl.value);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    azEl.addEventListener("click", e => {
      const btn = e.target.closest(".az-letter");
      if (!btn) return;
      const card = document.getElementById("term-" + firstIndex[btn.dataset.letter]);
      if (card) card.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    // The tools shown under a card depend on its state (A / B / C).
    function toolsHTML(t, localCorr) {
      const corr = resolveCorrection(t, localCorr);
      if (corr && corr.source === "filed") {
        return '<span class="corr-state">This term has a filed correction.</span>' +
               '<button class="btn-draft" type="button" data-action="draft">Draft a correction</button>';
      }
      if (localCorr && localCorr.replaced) {          // STATE C (device-local)
        return '<span class="corr-state">Original replaced on this device — kept in the pantry record.</span>' +
               '<a class="quiet-link" role="button" tabindex="0" data-action="filing">Copy filing block</a>' +
               '<a class="quiet-link" role="button" tabindex="0" data-action="undo">Undo replace</a>' +
               '<button class="btn-draft" type="button" data-action="draft">Revise correction</button>';
      }
      if (localCorr) {                                // STATE B (device-local)
        return '<a class="quiet-link" role="button" tabindex="0" data-action="filing">Copy filing block</a>' +
               '<button class="btn-warn" type="button" data-action="replace">Delete and replace original</button>' +
               '<button class="btn-draft" type="button" data-action="draft">Revise correction</button>';
      }
      return '<button class="btn-draft" type="button" data-action="draft">Draft a correction</button>';  // STATE A
    }

    function render(query = "") {
      const q = query.trim().toLowerCase();
      const decorate = safe => markQuery(safe, query);
      let shown = 0;
      firstIndex = {};
      const lettersSeen = [];
      cardsEl.innerHTML = "";

      sorted.forEach((t, i) => {
        if (activeCat !== "all" && t.category !== activeCat) return;
        const hay = (t.term + " " + t.original + " " + (t.corrected || "")).toLowerCase();
        if (q && !hay.includes(q)) return;
        shown++;

        const L = sortKey(t.term).charAt(0).toUpperCase();
        if (!(L in firstIndex)) { firstIndex[L] = i; lettersSeen.push(L); }

        const localCorr = getLocalCorrection(t.term);

        const card = document.createElement("article");
        card.className = "card";
        card.id = "term-" + i;
        card.dataset.index = i;
        card.innerHTML =
          '<h2 class="term">' + termHTML(t.term, query) + "</h2>" +
          definitionBlockHTML(t, decorate, localCorr) +
          '<div class="card-tools">' + toolsHTML(t, localCorr) + "</div>" +
          '<div class="correction" hidden>' +
            '<label class="corr-hint">Edit the wording below, then save it — it is stored on this device.</label>' +
            '<textarea class="corr-input" aria-label="Corrected definition"></textarea>' +
            '<div class="corr-actions">' +
              '<button class="btn-primary" type="button" data-action="save">Save correction here</button>' +
              '<button class="btn-warn" type="button" data-action="replace">Delete and replace original</button>' +
              '<button class="btn-quiet" type="button" data-action="close">Close</button>' +
            "</div>" +
          "</div>" +
          '<div class="filing" hidden>' +
            '<p class="corr-note">Filing block — put this into terms.json (or send it to me) so the same correction appears on every device:</p>' +
            '<pre class="corr-block"></pre>' +
            '<button class="btn-quiet" type="button" data-action="copyfiling">Copy</button>' +
          "</div>";

        // Pre-fill the editor with the wording currently in force.
        card.querySelector(".corr-input").value = effectiveDefinition(t, localCorr);
        cardsEl.appendChild(card);
      });

      emptyEl.style.display = shown === 0 ? "block" : "none";

      // A–Z reflects the currently visible set; shown when browsing (no text search).
      const showAZ = !q && shown > 1;
      azEl.style.display = showAZ ? "flex" : "none";
      if (showAZ) {
        azEl.innerHTML = lettersSeen
          .map(L => '<button class="az-letter" type="button" data-letter="' + L + '">' + L + "</button>")
          .join("");
      }

      const base = sorted.length;
      const filtering = q || activeCat !== "all";
      countEl.textContent = filtering
        ? shown + " of " + base + " term" + (base === 1 ? "" : "s")
        : base + " term" + (base === 1 ? "" : "s");
    }

    // Correction tool — all buttons handled here by delegation.
    cardsEl.addEventListener("click", e => {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const card = e.target.closest(".card");
      if (!card) return;
      const t = sorted[Number(card.dataset.index)];
      const panel  = card.querySelector(".correction");
      const filing = card.querySelector(".filing");
      const input  = card.querySelector(".corr-input");
      const block  = card.querySelector(".corr-block");
      const action = btn.dataset.action;

      if (action === "draft") {
        const open = !panel.hasAttribute("hidden");
        if (open) { panel.setAttribute("hidden", ""); }
        else { panel.removeAttribute("hidden"); input.focus(); }
      }
      else if (action === "save") {
        const text = input.value.trim();
        if (!text) return;
        // State B: store on this device (survives closing the page). No warnings.
        setLocalCorrection(t.term, { text: text, date: todayISO(), replaced: false });
        render(searchEl.value);
      }
      else if (action === "replace") {
        const existing = getLocalCorrection(t.term);
        const panelOpen = !panel.hasAttribute("hidden");
        const draft = input.value.trim();
        const text = (panelOpen && draft) ? draft : (existing && existing.text ? existing.text : draft);
        if (!text) return;
        if (!window.confirm("Replace the original with your correction? The original stays preserved in the pantry record.")) return;
        const date = (existing && existing.date) ? existing.date : todayISO();
        // State C: only the corrected text shows; original stays in the record.
        setLocalCorrection(t.term, { text: text, date: date, replaced: true });
        render(searchEl.value);
      }
      else if (action === "undo") {
        const existing = getLocalCorrection(t.term);
        if (existing) { existing.replaced = false; setLocalCorrection(t.term, existing); }
        render(searchEl.value);
      }
      else if (action === "filing") {
        const corr = getLocalCorrection(t.term);
        block.textContent =
          "CORRECTION FOR THE LEXICON\n" +
          "Term: " + t.term + "\n" +
          "Corrected definition:\n" + (corr && corr.text ? corr.text : effectiveDefinition(t, corr)) + "\n" +
          "Date: " + ((corr && corr.date) ? corr.date : todayISO());
        filing.removeAttribute("hidden");
        copyText(block.textContent, btn, "Copy filing block");
      }
      else if (action === "copyfiling") {
        copyText(block.textContent, btn, "Copy");
      }
      else if (action === "close") {
        panel.setAttribute("hidden", "");
      }
    });

    function copyText(text, btn, restore) {
      const done = () => {
        btn.textContent = "Copied!";
        setTimeout(() => { btn.textContent = restore; }, 1600);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, () => fallbackCopy(text, done));
      } else { fallbackCopy(text, done); }
    }

    function fallbackCopy(text, done) {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand("copy"); done(); } catch (_) {}
      document.body.removeChild(ta);
    }

    searchEl.addEventListener("input", e => render(e.target.value));

    loadTerms()
      .then(terms => {
        // Skip removed entries before sorting, counting, chips, or cards.
        const active = terms.filter(t => !t.removed);
        sorted = sortTerms(active);
        statusEl.style.display = "none";
        buildChips();
        render();
      })
      .catch(err => {
        statusEl.textContent = "Sorry — the lexicon could not load. (" + err.message + ")";
      });
  </script>
</body>
</html>
